services:
  - type: web
    name: xroute-api
    runtime: native
    plan: starter
    buildCommand: npm install && cargo build --release -p xroute-api
    startCommand: ./target/release/xroute-api
    healthCheckPath: /v1/healthz
    envVars:
      - key: XROUTE_WORKSPACE_ROOT
        value: /opt/render/project/src
      - key: XROUTE_LIVE_QUOTE_INPUTS_COMMAND
        value: node /opt/render/project/src/scripts/fetch-live-quote-inputs.mjs
      - key: XROUTE_EVM_POLICY_PATH
        value: /opt/render/project/src/config/mainnet/evm-execution-policy.json
      - key: XROUTE_RELAYER_AUTH_TOKEN
        sync: false
      - key: XROUTE_HUB_RPC_URL
        sync: false
      - key: XROUTE_HUB_PRIVATE_KEY
        sync: false
      - key: XROUTE_MOONBEAM_RPC_URL
        sync: false
      - key: XROUTE_MOONBEAM_PRIVATE_KEY
        sync: false
      - key: XROUTE_MOONBEAM_XCDOT_ASSET_ADDRESS
        sync: false
      - key: XROUTE_MOONBEAM_VDOT_ASSET_ADDRESS
        sync: false
      - key: XROUTE_MOONBEAM_SLPX_ADDRESS
        sync: false
      - key: XROUTE_MOONBEAM_SLPX_DEST_CHAIN_ID
        sync: false
      - key: XROUTE_ROUTER_TREASURY
        sync: false
      - key: XROUTE_HYDRATION_RPC_URL
        sync: false
      - key: XROUTE_HYDRATION_PRIVATE_KEY
        sync: false
      - key: XROUTE_BIFROST_RPC_URL
        sync: false
      - key: XROUTE_BIFROST_PRIVATE_KEY
        sync: false
